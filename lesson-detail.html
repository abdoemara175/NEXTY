<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTY | تفاصيل الدرس</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">NEXTY</div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="lessons.html">الدروس</a></li>
            <li><a href="quiz.html">الاختبارات</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 id="lesson-title">جاري تحميل الدرس...</h1>
            <p id="lesson-subtitle"></p>
        </div>
    </header>

    <main class="container">
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <a href="lessons.html" class="btn btn-back">العودة للدروس</a>
            <a href="../index.html" class="btn btn-back">العودة للرئيسية</a>
        </div>

        <div id="lesson-content">
            <!-- Content will be loaded by JavaScript -->
            <div style="text-align: center; padding: 2rem;">يرجى اختيار درس من قائمة الدروس.</div>
        </div>

        <div style="margin-top: 4rem; text-align: center;">
            <a href="quiz.html" class="btn" style="padding: 1rem 2rem; font-size: 1.2rem;">هل أنت مستعد للاختبار؟ انتقل للاختبار الآن!</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NEXTY - جميع الحقوق محفوظة | منصة تعليم ICDL</p>
    </footer>

    <script src="../js/lessons-data.js"></script>
    <script>
        // Get lesson ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id');

        // Load content
        if (lessonId && lessonsData[lessonId]) {
            const lesson = lessonsData[lessonId];
            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-subtitle').innerText = lesson.subtitle;
            
            let contentHTML = `
                <section class="card" style="margin-bottom: 2rem;">
                    <h3 style="border-bottom: 2px solid var(--accent-color); padding-bottom: 0.5rem;">الأهداف التعليمية لهذا الدرس</h3>
                    <ul style="margin-top: 1rem; padding-right: 1.5rem;">
                        <li><strong>المعرفي:</strong> ${lesson.objectives.cognitive}</li>
                        <li><strong>المهاري:</strong> ${lesson.objectives.skill}</li>
                        <li><strong>الوجداني:</strong> ${lesson.objectives.emotional}</li>
                    </ul>
                </section>

                <section class="lesson-text">
                    <h2 style="color: var(--primary-color); margin-bottom: 1rem;">شرح الدرس</h2>
                    <div style="font-size: 1.1rem; line-height: 1.8; text-align: justify;">
                        ${lesson.content}
                    </div>
                </section>

                <div class="card" style="margin-top: 3rem; background-color: #e7f3ff; border-right: 5px solid var(--accent-color);">
                    <h3>نصيحة تعليمية</h3>
                    <p>${lesson.tip}</p>
                </div>
            `;
            document.getElementById('lesson-content').innerHTML = contentHTML;
            document.title = `NEXTY | ${lesson.title}`;
        }
    </script>
</body>
</html>
